name: Deploy to OVH

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Setup Composer
        uses: php-actions/composer@v6
        with:
          command: install --no-dev --optimize-autoloader

      - name: Install npm dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate config.php
        run: |
          cat > dist/api/config.php << 'PHPEOF'
          <?php
          return [
              'smtp_host' => 'smtp.mail.ovh.net',
              'smtp_port' => 587,
              'smtp_secure' => 'tls',
              'smtp_username' => 'contact@famaby.sn',
              'smtp_password' => '${{ secrets.SMTP_PASSWORD }}',
              'email_to' => 'contact@famaby.sn',
              'from_name' => 'FAMABY',
          ];
          PHPEOF

      - name: Copy vendor to dist
        run: cp -r vendor dist/api/vendor

      - name: Deploy to OVH via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /www/
          delete: true
          exclude:
            - api/logs/**
